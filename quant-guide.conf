# ==============================================================================
# quant-guide.conf — Quantization Priority Guide for Model Downloads
# ==============================================================================
# Purpose:    Guides `model download` on which GGUF quantizations are suitable
#             for the current GPU (RTX 3050 Ti — 4 GB VRAM).
# Location:   ~/ubuntu-console/quant-guide.conf
# Edited by:  Wayne (manually editable as hardware or advice changes)
# Used by:    model download (warns if a downloaded quant is not recommended)
# Format:     Lines starting with # are comments. Blank lines ignored.
#             rating|quant_pattern|description
#
# Rating key:
#   recommended  — Best balance of speed, quality, and VRAM fit.
#   acceptable   — Works but may reduce GPU offload or be slower.
#   discouraged  — Too large for 4GB VRAM; wastes GPU capacity.
#
# The quant_pattern is matched case-insensitively against the filename.
#
# EDITING GUIDE:
# - To change priorities, move lines between sections or change the rating.
# - To add new quants, add a line with the same format.
# - `model download` reads this file and warns (does NOT block) if the
#   chosen quant is discouraged. You can always override the warning.
#
# WHY QUANTIZATION MATTERS ON 4 GB VRAM
# ──────────────────────────────────────
# Larger quants use more memory per weight, which means:
#   - Fewer layers can be offloaded to the GPU (-ngl 999 offloads less)
#   - More layers fall back to CPU (slower inference)
#   - Paradoxically, higher quant = SLOWER performance on small GPUs
#
# The sweet spot for 7B–8B models on 4 GB VRAM is Q4_K_M:
#   - Good quality (nearly indistinguishable from Q5_K_M in benchmarks)
#   - Fits well, allowing maximum GPU layer offload
#   - Stable inference with no OOM risks
#
# APPROXIMATE VRAM USAGE (7B–8B models)
# ──────────────────────────────────────
# Quant       Approx Size    GPU Layers Possible    Recommendation
# Q2_K        ~2.5 GB        ~all layers             Use if speed is paramount
# Q3_K_M      ~3.3 GB        ~28-30 layers           Good speed/quality trade
# Q4_K_M      ~4.1 GB        ~20-24 layers           Best all-round choice
# Q5_K_M      ~4.8 GB        ~12-16 layers           Marginal quality gain
# Q6_K        ~5.5 GB        ~8-10 layers            Rarely worth it
# Q8_0        ~7.2 GB        ~0 (CPU-only)           Avoid on 4GB GPU
# F16         ~14 GB         ~0 (CPU-only)           Avoid on 4GB GPU
#
# ==============================================================================

# ── Recommended (download these first) ───────────────────────────────────────
recommended|Q4_K_M|Best all-round: quality + speed + GPU fit for 4GB VRAM
recommended|Q4_K_S|Slightly smaller Q4, good alternative

# ── Acceptable (works, but trade-offs) ───────────────────────────────────────
acceptable|Q3_K_M|Smaller = more GPU layers = sometimes faster than Q4
acceptable|Q3_K_L|Good quality for Q3 tier
acceptable|Q3_K_S|Smallest Q3, fastest but lower quality
acceptable|Q5_K_M|Marginal quality gain over Q4, fewer GPU layers
acceptable|Q5_K_S|Slightly smaller Q5 variant
acceptable|Q2_K|Very fast but noticeable quality loss
acceptable|IQ3_M|iQuant Q3 — experimental but efficient
acceptable|IQ3_XXS|iQuant Q3 extra-small — very fast
acceptable|IQ2_XS|iQuant Q2 — extremely small, speed-focused
acceptable|IQ2_XXS|iQuant Q2 extra-small — minimal quality

# ── Discouraged (too large for 4GB VRAM — most layers stay on CPU) ───────────
discouraged|Q6_K|Too large: ~5.5GB for 8B model, minimal quality gain over Q4
discouraged|Q8_0|Way too large: forces CPU-only on 4GB GPU
discouraged|F16|Full precision: 14GB+ for 8B model, CPU-only
discouraged|F32|Double precision: 28GB+, never useful for inference
discouraged|BF16|Brain float 16: same size as F16, CPU-only

# end of file
