[pytest]
testpaths = tests
python_files = test_*.py
addopts = -ra --timeout=1000 --timeout_method=thread -W ignore::requests.RequestsDependencyWarning
markers =
    bats: Shell test suites executed via BATS
    bats_unit: Fast unit-only BATS files
    bats_fast: Static analysis BATS suites (no profile sourcing)
    bats_full: Full runtime behavioural BATS suite (379 tests)
    bats_integration: Integration-level BATS suites (non-hermetic)
    bats_default: Unclassified BATS files
    integration: Long-running integration coverage
    slow: Tests that are expected to take a long time
