[pytest]
testpaths = tests
python_files = test_*.py
addopts = -ra --timeout=600 --timeout_method=thread
markers =
    bats: BATS test bridge wrapper
    bats_unit: BATS unit tests
    bats_fast: Fast static BATS tests
    bats_full: Full tactical-console BATS suite
    bats_integration: BATS integration tests
    bats_default: Catch-all BATS tests
    slow: Tests that are expected to take a long time

    bats: shell test suites executed via BATS
    bats_unit: fast unit-only bats files
    bats_fast: static analysis bats suites (no profile sourcing)
    bats_full: full runtime behavioural bats suites (497 tests)
    bats_integration: integration-level bats suites (non-hermetic)
    bats_default: unclassified bats files
    integration: long-running integration coverage
