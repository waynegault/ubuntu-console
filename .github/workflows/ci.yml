name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Bash syntax check
        run: |
          for f in tactical-console.bashrc install.sh env.sh scripts/*.sh bin/*.sh; do
            [[ -f "$f" ]] || continue
            echo "Checking $f ..."
            bash -n "$f"
          done

      - name: Loader integrity guard
        run: |
          # Catch accidental corruption of the loader (e.g. terminal output
          # prepended to the file — see commit 3a7246a).
          first_line=$(head -1 tactical-console.bashrc)
          if [[ "$first_line" != "# shellcheck shell=bash" ]]; then
            echo "ERROR: tactical-console.bashrc first line is '$first_line'"
            echo "Expected: '# shellcheck shell=bash'"
            exit 1
          fi
          echo "Loader first-line OK"

      - name: ShellCheck
        run: |
          for f in tactical-console.bashrc install.sh env.sh scripts/*.sh bin/*.sh; do
            [[ -f "$f" ]] || continue
            echo "Checking $f ..."
            shellcheck -s bash "$f"
          done

      - name: Unicode safety
        run: SKIP_UNICODE_CHECK=0 tools/lint.sh

      - name: Repo boundary guard
        run: tools/check-repo-boundaries.sh

  test:
    name: Fast Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run fast tests (50 smoke tests)
        run: bats tests/tactical-console-fast.bats

      - name: Run lint script
        run: tools/lint.sh

    # Full suite (379 tests) is run locally via: bats tests/tactical-console.bats

  behavioral:
    name: Behavioral BATS (unit + integration)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run unit tests
        run: |
          # 04-llama-cpp-inventory excluded: performs live downloads + mutates host
          bats tests/unit/01-refresh-keys.bats \
               tests/unit/02-so-startup.bats

      - name: Run integration tests
        run: |
          bats tests/integration/01-maintenance.bats \
               tests/integration/02-model-lifecycle.bats \
               tests/integration/03-backup-restore.bats \
               tests/integration/04-watchdog.bats \
               tests/integration/05-refresh-keys.bats

  module-count:
    name: Module Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Numbered modules discovered
        run: |
          count=$(ls scripts/[0-9][0-9]-*.sh | wc -l)
          echo "Found $count modules"
          [[ "$count" -gt 0 ]]

      - name: All modules have version comments
        run: |
          missing=0
          for f in scripts/[0-9][0-9]-*.sh scripts/09b-gog.sh; do
            [[ -f "$f" ]] || continue
            if ! grep -q '^# Module Version:' "$f"; then
              echo "MISSING version in $f"
              missing=$((missing + 1))
            fi
          done
          [[ "$missing" -eq 0 ]]

      - name: All modules have AI INSTRUCTION
        run: |
          missing=0
          for f in scripts/[0-9][0-9]-*.sh bin/*.sh; do
            [[ -f "$f" ]] || continue
            if ! grep -q 'AI INSTRUCTION' "$f"; then
              echo "MISSING AI INSTRUCTION in $f"
              missing=$((missing + 1))
            fi
          done
          [[ "$missing" -eq 0 ]]

      - name: All files end with newline
        run: |
          for f in tactical-console.bashrc install.sh env.sh \
                   scripts/[0-9][0-9]-*.sh bin/*.sh; do
            [[ -f "$f" ]] || continue
            if [[ "$(tail -c 1 "$f" | xxd -p)" != "0a" ]]; then
              echo "Missing trailing newline in $f"
              exit 1
            fi
          done

      - name: No carriage returns
        run: |
          for f in tactical-console.bashrc install.sh env.sh \
                   scripts/[0-9][0-9]-*.sh bin/*.sh; do
            [[ -f "$f" ]] || continue
            count=$(grep -Pc '\r' "$f" || true)
            if [[ "$count" -gt 0 ]]; then
              echo "Carriage returns found in $f"
              exit 1
            fi
          done

  python:
    name: Python Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-timeout pydantic networkx
          pip install tree-sitter tree-sitter-bash tree-sitter-python

      - name: Ruff lint
        run: ruff check scripts/kgraph/

      - name: Run Python tests
        run: python -m pytest tests/test_kgraph.py tests/test_models.py tests/test_model_autotune.py tests/test_untested_modules.py -x --timeout=120 -q

